name: open_story_flutter
description: Flutter wrapper for the open-story native Android and iOS SDKs.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.12.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.openstory.sdk.flutter
        pluginClass: OpenStoryFlutterPlugin
      ios:
        pluginClass: OpenStoryFlutterPlugin
