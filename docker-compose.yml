services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - openstory-data:/data
    env_file:
      - .env.production
    restart: unless-stopped
    expose:
      - "3000"
      - "3001"

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  openstory-data:
