services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ${OPEN_STORY_HOST_DATA_DIR:-./data}:/data/db
      - ${OPEN_STORY_HOST_ASSETS_DIR:-./assets}:/data/assets
    env_file:
      - .env.production
    restart: unless-stopped
    expose:
      - "3000"
      - "3001"

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    restart: unless-stopped
