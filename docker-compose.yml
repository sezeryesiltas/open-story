services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runner
      args:
        NEXT_PUBLIC_OPEN_STORY_BUILD_NUMBER: ${OPEN_STORY_BUILD_NUMBER:-local}
    volumes:
      - ${OPEN_STORY_HOST_DATA_DIR:-./data}:/data/db
      - ${OPEN_STORY_HOST_ASSETS_DIR:-./assets}:/data/assets
    env_file:
      - .env.production
    restart: unless-stopped
    expose:
      - "3001"

  admin-web:
    build:
      context: .
      dockerfile: Dockerfile
      target: admin-web-runner
      args:
        NEXT_PUBLIC_OPEN_STORY_BUILD_NUMBER: ${OPEN_STORY_BUILD_NUMBER:-local}
    env_file:
      - .env.production
    depends_on:
      - api
    restart: unless-stopped
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
    depends_on:
      - api
      - admin-web
    restart: unless-stopped
